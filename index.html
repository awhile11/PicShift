<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PieShift · Puzzle Arena</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>PieShift</h1>
      <div class="user-badge">
        <span class="user-icon">👤</span>
        <span class="user-name" id="displayName">User</span>
      </div>
    </div>

    <div class="main-panel">
      <div class="stats-bar">
        <div class="stat-item">
          <span class="stat-label">Time:</span>
          <span class="stat-value" id="timer">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Moves:</span>
          <span class="stat-value" id="moves">0</span>
        </div>
      </div>

      <div class="control-bar">
        <button class="btn" onclick="document.getElementById('upload').click()">Choose file</button>
        <select id="difficulty" class="btn">
          <option value="3">Easy (3x3)</option>
          <option value="4">Medium (4x4)</option>
          <option value="5">Hard (5x5)</option>
        </select>
        <button class="btn" onclick="createChallenge()">Challenge Friend</button>
      </div>

      <div class="action-bar">
        <button class="btn primary" onclick="startGame()">Start</button>
        <button class="btn secondary" onclick="finishGame()">Finish</button>
      </div>

      <div id="share" class="share-box"></div>

      <div class="puzzle-container">
        <div id="puzzle"></div>
      </div>

      <div class="leaderboard-section">
        <h2>🏆 Leaderboard</h2>
        <ul id="leaderboard"></ul>
      </div>
    </div>
  </div>

  <!-- Name Modal -->
  <div id="nameModal" class="modal">
    <div class="modal-content">
      <h3>Enter Your Name</h3>
      <input type="text" id="playerName" placeholder="Your name..." maxlength="20">
      <div class="modal-buttons">
        <button class="btn primary" onclick="savePlayerName()">Save</button>
        <button class="btn secondary" onclick="closeNameModal()">Cancel</button>
      </div>
    </div>
  </div>

  <input type="file" id="upload" accept="image/*" style="display: none;">

  <script src="firebase.js"></script>
  <script src="script.js"></script>
</body>
</html>
